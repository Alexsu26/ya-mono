name: YA Desktop Draft Release

on:
  push:
    branches:
      - 'release/desktop/**'
  workflow_dispatch:
    inputs:
      version:
        description: Desktop version without the leading v, e.g. 0.1.0-beta.1
        required: true
        type: string
      ref:
        description: Branch, tag, or SHA to build
        required: true
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-draft-${{ github.event_name == 'push' && github.ref_name || inputs.version }}
  cancel-in-progress: true

env:
  DESKTOP_RELEASE_PREFIX: desktop-v

jobs:
  prepare:
    name: Prepare desktop draft release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      ref: ${{ steps.release.outputs.ref }}
      release_name: ${{ steps.release.outputs.release_name }}
    steps:
      - name: Resolve desktop release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            branch="${{ github.ref_name }}"
            version="${branch#release/desktop/}"
            ref="${{ github.sha }}"
          else
            version="${{ inputs.version }}"
            ref="${{ inputs.ref }}"
          fi
          version="${version#v}"
          version="${version#desktop-v}"
          if [ -z "$version" ] || [ "$version" = "${{ github.ref_name }}" ]; then
            echo "Could not derive desktop version" >&2
            exit 1
          fi
          tag="${DESKTOP_RELEASE_PREFIX}${version}"
          {
            echo "version=$version"
            echo "tag=$tag"
            echo "ref=$ref"
            echo "release_name=YA Desktop $version"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build YA Desktop (${{ matrix.platform.name }})
    needs: prepare
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            os: ubuntu-latest
          - name: macos
            os: macos-latest
          - name: windows
            os: windows-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.13'

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libayatana-appindicator3-dev \
            libgdk-pixbuf-2.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev

      - name: Prepare bundled uv resource
        run: python scripts/prepare-desktop-uv-resource.py

      - name: Build unsigned YA Desktop artifact
        run: pnpm --dir apps/ya-desktop tauri:build

      - name: Prepare artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p desktop-artifacts
          find apps/ya-desktop/src-tauri/target/release/bundle -type f \
            \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.msi' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) \
            -exec cp {} desktop-artifacts/ \;
          if [ -z "$(find desktop-artifacts -type f -print -quit)" ]; then
            echo "No desktop artifacts were produced" >&2
            exit 1
          fi
          cd desktop-artifacts
          sha256sum * > "SHA256SUMS-${{ matrix.platform.name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ya-desktop-${{ needs.prepare.outputs.version }}-${{ matrix.platform.name }}
          path: desktop-artifacts/*
          if-no-files-found: error

  draft-release:
    name: Create or refresh desktop draft release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 0

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ya-desktop-${{ needs.prepare.outputs.version }}-*
          path: desktop-artifacts
          merge-multiple: true

      - name: Generate combined checksums
        shell: bash
        run: |
          set -euo pipefail
          cd desktop-artifacts
          find . -maxdepth 1 -type f ! -name 'SHA256SUMS*' -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare.outputs.tag }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
          RELEASE_REF: ${{ needs.prepare.outputs.ref }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" --json isDraft --jq .isDraft 2>/dev/null | grep -qx 'false'; then
            echo "Release $TAG_NAME is already published; create a new desktop version." >&2
            exit 1
          fi

          git tag -f "$TAG_NAME" "$RELEASE_REF"
          git push origin "refs/tags/$TAG_NAME" --force

          notes_file="desktop-release-notes.md"
          cat > "$notes_file" <<EOF
          Unsigned YA Desktop draft release for $VERSION.

          This draft is generated from release branch pushes. Review artifacts manually, then publish the release from GitHub when ready.

          Remaining release-channel work:
          - macOS Developer ID signing, notarization, and stapling
          - Windows Authenticode signing
          - Tauri updater plugin and updater artifact signatures
          - desktop-release-index latest.json generation after publish
          EOF
          sed -i 's/^          //' "$notes_file"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --draft=true \
              --latest=false \
              --title "$RELEASE_NAME" \
              --notes-file "$notes_file"
          else
            gh release create "$TAG_NAME" \
              --draft \
              --latest=false \
              --target "$RELEASE_REF" \
              --title "$RELEASE_NAME" \
              --notes-file "$notes_file"
          fi

          gh release upload "$TAG_NAME" desktop-artifacts/* --clobber

      - name: Print draft release URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare.outputs.tag }}
        run: gh release view "$TAG_NAME" --json url --jq .url

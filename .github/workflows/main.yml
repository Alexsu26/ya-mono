name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libayatana-appindicator3-dev \
            libgdk-pixbuf-2.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Run checks
        run: make check

  desktop-tests:
    name: YA Desktop Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Run YA Desktop tests
        run: make desktop-test

  tests-and-type-check:
    name: Tests and Type Checks (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
            extras: "all"
            coverage: false
            type_check: false
          - os: ubuntu-latest
            python-version: "3.12"
            extras: "all"
            coverage: false
            type_check: false
          - os: ubuntu-latest
            python-version: "3.13"
            extras: "all"
            coverage: true
            type_check: true
          - os: ubuntu-latest
            python-version: "3.13"
            extras: ""
            coverage: false
            type_check: false
          - os: macos-latest
            python-version: "3.13"
            extras: "all"
            coverage: false
            type_check: false
      fail-fast: false
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
          extras: ${{ matrix.extras }}

      - name: Run tests
        run: >-
          uv run python -m pytest
          packages/ya-agent-sdk/tests
          packages/yaacli/tests
          packages/ya-claw/tests
          -n 4 -vv --inline-snapshot=disable
          ${{ matrix.coverage && '--cov --cov-config=pyproject.toml --cov-report term-missing' || '' }}

      - name: Check typing
        if: ${{ matrix.type_check }}
        run: uv run python -m pyright

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: wh1isper/ya-mono
        if: ${{ matrix.coverage }}

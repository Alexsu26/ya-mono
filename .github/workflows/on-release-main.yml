name: Release Main

permissions:
  contents: write
  packages: write

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish Release
    if: ${{ !startsWith(github.event.release.tag_name, 'desktop-v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Sync skills folder
        run: bash scripts/sync-skills.sh

      - name: Build all packages
        run: uv build --all-packages -o dist

      - name: Inspect package version
        id: inspect_package
        run: |
          version=$(cd packages/ya-agent-sdk && uvx --with uv-dynamic-versioning hatchling version)
          echo "version=$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish packages to PyPI
        run: uv publish dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Upload dists to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber

      - name: Create skill zip archives
        run: python scripts/build-skill-zips.py

      - name: Upload skill zip archives to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*SKILL.zip --clobber

# YAACLI CLI Global Configuration
# Location: ~/.yaacli/config.toml

[general]
# Model configuration (required)
# Format: "provider:model_name"
# Examples:
#   - anthropic:claude-sonnet-4-5
#   - openai-chat:gpt-4o
#   - google:gemini-2.5-pro
#   - oauth@codex:gpt-5.5  # run `ya-oauth login codex` first
model = ""

# Model settings: preset name or custom dict
# Available presets: anthropic_default, openai_default, gemini_thinking_level_default, etc.
# model_settings = "anthropic_default"

# Model config for context management (context window, capabilities, etc.)
# Presets: claude_200k, claude_1m, gpt5_270k, gemini_200k, gemini_1m
# Aliases: claude, anthropic, openai, gemini
# model_cfg = "claude_200k"
#
# /model can switch between selectable profiles for the current session.
# The last selected profile is remembered in ~/.yaacli/state.json.
# [model_profiles.fast]
# label = "Fast"
# model = "openai-responses:gpt-5-mini"
# model_settings = "openai_responses_low"
# model_cfg = "gpt5_270k"
#
# [model_profiles.deep]
# label = "Deep"
# model = "anthropic:claude-sonnet-4-5"
# model_settings = "anthropic_adaptive_high"
# model_cfg = "claude_200k"
#
# [model_profiles.codex_oauth]
# label = "Codex OAuth"
# model = "oauth@codex:gpt-5.5"
# model_settings = "openai_responses_high"
# model_cfg = "gpt5_270k"
#
# Or custom configuration:
# [general.model_cfg]
# context_window = 200000
# max_images = 20
# max_videos = 0
# compact_threshold = 0.90
# proactive_context_management_threshold = 0.5
# capabilities = ["vision"]  # Options: vision, video_understanding, document_understanding

# Maximum requests per session
max_requests = 1000

# Retry interrupted provider/SSE streams by resuming from recovered message history.
agent_stream_resume_on_error = true
agent_stream_resume_max_attempts = 3
agent_stream_resume_prompt = "The previous streaming model request failed before the agent finished. Continue the task from the available conversation history. Avoid repeating completed work."

# Maximum iterations for /goal command
# max_goal_iterations = 10

# Custom system prompt file path (optional)
# If empty, uses built-in default from CLI package
# system_prompt_file = "~/.yaacli/system_prompt.md"

[env]
# Environment variable overrides for API keys
# ANTHROPIC_API_KEY = "sk-ant-..."
# OPENAI_API_KEY = "sk-..."
# GOOGLE_API_KEY = "..."

[oauth_refresh]
# Proactively refresh OAuth-backed model provider tokens during CLI lifetime.
enabled = true
interval_seconds = 1800
failure_retry_seconds = 60
refresh_on_startup = true

[session]
# Retain the latest N turn snapshots per session.
max_turns_per_session = 20
# Retain the latest N sessions globally.
max_sessions = 100
# Optional age-based pruning in days.
# max_session_age_days = 90

[display]
# Code highlighting theme ("dark" or "light")
code_theme = "dark"
# Maximum lines to show for tool results
max_tool_result_lines = 5
# Maximum length for tool argument display
max_arg_length = 100
# Show token usage in status bar
show_token_usage = true
# Show elapsed time
show_elapsed_time = true

[security.shell_review]
# Enable small-model shell command review before execution.
# When enabled, model is required. model_settings accepts a preset name or a TOML table.
enabled = false
# model = "gateway@openai-responses:gpt-5.4-mini"
# model_settings = "openai_responses_low"
# on_needs_approval = "defer"
# risk_threshold = "high"

[subagents]
# Subagents are loaded from ~/.yaacli/subagents/
# Run `yaacli setup` to initialize default subagents

# Disable specific subagents by name
disabled = []

# Override settings for specific subagents
# [subagents.overrides.explorer]
# model = "openai-chat:gpt-4o"
# model_settings = "openai_default"

# =============================================================================
# Custom Slash Commands
# =============================================================================
# Define custom commands that can be triggered with /name
# Each command has: prompt, mode (optional), description (optional)

[commands.commit]
description = "Review and commit changes"
mode = "act"
prompt = """Please check current git changes and commit them with: `Co-Authored-By: YAACLI <261597362+yaacli-bot@users.noreply.github.com>`
"""

[commands.review]
description = "Comprehensive code review"
mode = "act"
prompt = """Please review the current changes and pull request.
First, use bash commands to determine the review scope:

1. Check current branch: `git branch --show-current`
2. If on main/master: review uncommitted changes only
3. If on feature branch: review all changes since branching from main
4. Conduct comprehensive code review focusing on:
   - Logic errors and bugs
   - Security vulnerabilities
   - Code quality and error handling
   - Project standards and naming conventions
"""

# Example: Add your own custom commands
# [commands.deploy]
# description = "Deploy to production"
# mode = "act"
# prompt = "Please help me deploy to production..."

# pytest.ini
[pytest]
asyncio_mode = auto
addopts = --import-mode=importlib
filterwarnings =
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning
testpaths = ["packages/ya-agent-environment/tests", "packages/ya-agent-sdk/tests", "packages/yaacli/tests", "packages/ya-claw/tests"]

# pytest.ini
[pytest]
asyncio_mode = auto
addopts = --import-mode=importlib
filterwarnings =
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning
    ignore:datetime\.datetime\.utcfromtimestamp\(\) is deprecated.*:DeprecationWarning:lark_oapi\.ws\.pb\.google\.protobuf\.internal\.well_known_types
    ignore:websockets\.InvalidStatusCode is deprecated:DeprecationWarning:lark_oapi\.ws\.client
    ignore:websockets\.legacy is deprecated.*:DeprecationWarning:websockets\.legacy
    ignore:Exception ignored.*_ProactorBasePipeTransport.*:pytest.PytestUnraisableExceptionWarning
testpaths =
    packages/ya-agent-environment/tests
    packages/ya-ripgrep-core/tests
    packages/ya-agent-sdk/tests
    packages/ya-agent-stream-protocol/tests
    packages/yaacli/tests
    packages/ya-claw/tests
